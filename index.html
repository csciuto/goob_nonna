<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRANDMOTHER — Analog Synthesizer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
:root {
  --panel:    #DDD5C2;
  --module:   #E8E0CE;
  --border:   #B8AA94;
  --text:     #1A1208;
  --textdim:  #5A4A32;
  --wood:     #7A4E28;
  --wood2:    #9A6830;
  --accent:   #E87820;
  --knob1:    #C8B898;
  --knob2:    #786040;
  --led-off:  #3A1A08;
  --led-on:   #FF6020;
  --key-w:    #F0EAD8;
  --key-b:    #14100A;
}
body {
  background: #100C08;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh; padding: 20px;
  font-family: 'Share Tech Mono', monospace;
}
#synth {
  width: 980px;
  background: var(--panel);
  border-radius: 10px;
  box-shadow: 0 24px 64px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.25);
  overflow: hidden;
  position: relative;
}
/* Wood side panels */
#synth::before, #synth::after {
  content: '';
  position: absolute; top: 0; bottom: 0; width: 36px; z-index: 20;
  background: repeating-linear-gradient(180deg,
    var(--wood) 0px, var(--wood2) 3px, var(--wood) 5px,
    #5A3810 7px, var(--wood) 10px);
}
#synth::before { left:0; border-radius: 10px 0 0 10px; box-shadow: 3px 0 8px rgba(0,0,0,.4) inset; }
#synth::after  { right:0; border-radius: 0 10px 10px 10px; box-shadow: -3px 0 8px rgba(0,0,0,.4) inset; }

.inner { margin: 0 36px; }

/* HEADER */
.hdr {
  background: linear-gradient(180deg, #201808 0%, #100A04 100%);
  padding: 10px 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.hdr-logo { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--accent); letter-spacing: 5px; text-shadow: 0 0 20px rgba(232,120,32,.5); }
.hdr-sub { font-size: 8px; color: #6A5030; letter-spacing: 2.5px; margin-top: 2px; }
.hdr-brand { font-size: 10px; color: #5A4020; letter-spacing: 3px; text-align:right; }

/* PANEL ROWS */
.row1, .row2 {
  padding: 10px 12px 8px;
  display: grid; gap: 7px;
}
.row1 { grid-template-columns: 1fr 1fr .85fr 1.55fr 1.65fr 1fr .7fr .65fr; }
.row2 { grid-template-columns: 1fr 1fr 1fr .8fr; }

/* MODULE */
.mod {
  background: var(--module);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 7px 5px 6px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 2px 4px rgba(0,0,0,.2);
}
.mod-title {
  font-size: 7.5px; letter-spacing: 2px; color: var(--textdim);
  text-align: center; border-bottom: 1px solid var(--border);
  padding-bottom: 4px; margin-bottom: 6px;
}

/* KNOB */
.kg { display: flex; flex-direction: column; align-items: center; }
.kl { font-size: 7px; letter-spacing: 1px; color: var(--textdim); margin-top: 2px; text-align: center; }
canvas.knob { cursor: ns-resize; display: block; touch-action: none; }
.krow { display: flex; justify-content: space-evenly; flex-wrap: wrap; gap: 2px; }

/* WAVE BUTTONS */
.wsel { display: flex; gap: 3px; justify-content: center; margin-bottom: 5px; }
.wbtn {
  width: 22px; height: 17px; border: 1px solid var(--border);
  background: var(--panel); border-radius: 2px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s, border-color .1s;
}
.wbtn.on { background: var(--accent); border-color: #C06010; }
.wbtn svg { width: 14px; height: 9px; color: var(--textdim); overflow: visible; }
.wbtn.on svg { color: #fff; }

/* BUTTON */
.btn {
  padding: 3px 7px;
  background: var(--panel); border: 1px solid var(--border); border-radius: 3px;
  font-family: 'Share Tech Mono', monospace; font-size: 8px; letter-spacing: 1px;
  color: var(--text); cursor: pointer; transition: all .1s;
}
.btn:hover { background: var(--knob1); }
.btn.on { background: var(--accent); color: #fff; border-color: #C06010; }

/* LED */
.led { width: 7px; height: 7px; border-radius: 50%; background: var(--led-off); display: inline-block; transition: all .08s; }
.led.on { background: var(--led-on); box-shadow: 0 0 6px var(--led-on); }

/* MODE BUTTONS ROW */
.mrow { display: flex; gap: 3px; justify-content: center; flex-wrap: wrap; margin-top: 4px; }

/* DIVIDER */
.vsep { width: 1px; background: var(--border); margin: 0 3px; }

/* PATCH JACKS */
.jacks { background: #181008; padding: 5px 12px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.jack-g { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.jack { width: 12px; height: 12px; border-radius: 50%; background: #1E1408; border: 1px solid #2E2010; box-shadow: inset 0 1px 2px rgba(0,0,0,.6); }
.jl { font-size: 5.5px; color: #3A2A18; letter-spacing: .5px; }

/* KEYBOARD SECTION */
.kbd-section { background: #140E08; padding: 8px 12px 14px; }
.kbd-ctrl {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0 8px;
}
.oct-lbl { font-size: 8px; letter-spacing: 2px; color: #5A4030; }
.oct-btn { width: 24px; height: 20px; display: flex; align-items: center; justify-content: center; }
#keyboard { position: relative; margin: 0 auto; height: 96px; }
.wkey {
  position: absolute; width: 26px; height: 96px;
  background: var(--key-w); border: 1px solid #9A8870;
  border-radius: 0 0 4px 4px; cursor: pointer;
  box-shadow: 2px 2px 0 rgba(0,0,0,.25);
  transition: background .04s;
}
.wkey:hover { background: #E8E0CA; }
.wkey.on { background: #C8B8A0; box-shadow: 1px 1px 0 rgba(0,0,0,.25); }
.bkey {
  position: absolute; width: 16px; height: 60px; top: 0;
  background: var(--key-b); border-radius: 0 0 3px 3px;
  cursor: pointer; z-index: 2;
  box-shadow: 2px 3px 0 rgba(0,0,0,.5);
  transition: background .04s;
}
.bkey:hover { background: #2A1E10; }
.bkey.on { background: #3A2818; }
</style>
</head>
<body>
<div id="synth">
 <div class="inner">

  <div class="hdr">
   <div>
    <div class="hdr-logo">GRANDMOTHER</div>
    <div class="hdr-sub">SEMI-MODULAR ANALOG SYNTHESIZER</div>
   </div>
   <div class="hdr-brand">MOOG<br><span style="font-size:7px;letter-spacing:1px;">MUSIC</span></div>
  </div>

  <!-- ROW 1 -->
  <div class="row1">

   <!-- VCO 1 -->
   <div class="mod">
    <div class="mod-title">VCO 1</div>
    <div class="wsel" id="w1"></div>
    <div class="krow">
     <div class="kg"><canvas class="knob" id="v1oct" width="42" height="42"></canvas><div class="kl">OCT</div></div>
     <div class="kg"><canvas class="knob" id="v1tune" width="42" height="42"></canvas><div class="kl">TUNE</div></div>
    </div>
   </div>

   <!-- VCO 2 -->
   <div class="mod">
    <div class="mod-title">VCO 2</div>
    <div class="wsel" id="w2"></div>
    <div class="krow">
     <div class="kg"><canvas class="knob" id="v2oct" width="42" height="42"></canvas><div class="kl">OCT</div></div>
     <div class="kg"><canvas class="knob" id="v2tune" width="42" height="42"></canvas><div class="kl">TUNE</div></div>
    </div>
   </div>

   <!-- MIXER -->
   <div class="mod">
    <div class="mod-title">MIXER</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
     <div class="kg"><canvas class="knob" id="mx1" width="38" height="38"></canvas><div class="kl">VCO1</div></div>
     <div class="kg"><canvas class="knob" id="mx2" width="38" height="38"></canvas><div class="kl">VCO2</div></div>
     <div class="kg"><canvas class="knob" id="mxn" width="38" height="38"></canvas><div class="kl">NOISE</div></div>
    </div>
   </div>

   <!-- FILTER -->
   <div class="mod">
    <div class="mod-title">LADDER FILTER</div>
    <div class="krow">
     <div class="kg"><canvas class="knob" id="fcut" width="46" height="46"></canvas><div class="kl">CUTOFF</div></div>
     <div class="kg"><canvas class="knob" id="fres" width="42" height="42"></canvas><div class="kl">RESON</div></div>
     <div class="kg"><canvas class="knob" id="fenv" width="40" height="40"></canvas><div class="kl">ENV AMT</div></div>
     <div class="kg"><canvas class="knob" id="fdrv" width="38" height="38"></canvas><div class="kl">DRIVE</div></div>
    </div>
   </div>

   <!-- ENVELOPES -->
   <div class="mod">
    <div class="mod-title">ENVELOPES</div>
    <div style="display:flex;gap:4px;">
     <div style="flex:1;">
      <div style="font-size:7px;color:#8A6840;letter-spacing:1px;text-align:center;margin-bottom:3px;">FILTER</div>
      <div class="krow" style="gap:1px;">
       <div class="kg"><canvas class="knob" id="fea" width="34" height="34"></canvas><div class="kl">A</div></div>
       <div class="kg"><canvas class="knob" id="fed" width="34" height="34"></canvas><div class="kl">D</div></div>
       <div class="kg"><canvas class="knob" id="fes" width="34" height="34"></canvas><div class="kl">S</div></div>
       <div class="kg"><canvas class="knob" id="fer" width="34" height="34"></canvas><div class="kl">R</div></div>
      </div>
     </div>
     <div class="vsep"></div>
     <div style="flex:1;">
      <div style="font-size:7px;color:#8A6840;letter-spacing:1px;text-align:center;margin-bottom:3px;">AMP</div>
      <div class="krow" style="gap:1px;">
       <div class="kg"><canvas class="knob" id="aea" width="34" height="34"></canvas><div class="kl">A</div></div>
       <div class="kg"><canvas class="knob" id="aed" width="34" height="34"></canvas><div class="kl">D</div></div>
       <div class="kg"><canvas class="knob" id="aes" width="34" height="34"></canvas><div class="kl">S</div></div>
       <div class="kg"><canvas class="knob" id="aer" width="34" height="34"></canvas><div class="kl">R</div></div>
      </div>
     </div>
    </div>
   </div>

   <!-- LFO -->
   <div class="mod">
    <div class="mod-title">LFO</div>
    <div class="wsel" id="wl"></div>
    <div class="krow">
     <div class="kg"><canvas class="knob" id="lrate" width="42" height="42"></canvas><div class="kl">RATE</div></div>
     <div class="kg"><canvas class="knob" id="lamt" width="42" height="42"></canvas><div class="kl">AMOUNT</div></div>
    </div>
    <div class="mrow" id="ldest"></div>
   </div>

   <!-- ARPEGGIO -->
   <div class="mod">
    <div class="mod-title">ARPEGGIO</div>
    <div style="text-align:center;margin-bottom:5px;">
     <span class="led" id="arpled"></span>
     <button class="btn" id="arpbtn" style="margin-left:4px;font-size:8px;">OFF</button>
    </div>
    <div class="kg" style="margin:0 auto;">
     <canvas class="knob" id="arprate" width="40" height="40"></canvas>
     <div class="kl">RATE</div>
    </div>
    <div class="mrow" id="arpmode"></div>
   </div>

   <!-- REVERB + MASTER -->
   <div class="mod">
    <div class="mod-title">REVERB</div>
    <div class="kg" style="margin:0 auto 4px;">
     <canvas class="knob" id="rvb" width="42" height="42"></canvas>
     <div class="kl">MIX</div>
    </div>
    <div class="kg" style="margin:0 auto;">
     <canvas class="knob" id="mvol" width="42" height="42"></canvas>
     <div class="kl">MASTER</div>
    </div>
   </div>

  </div><!-- end row1 -->

  <!-- PATCH JACKS -->
  <div class="jacks" id="jacks"></div>

  <!-- KEYBOARD -->
  <div class="kbd-section">
   <div class="kbd-ctrl">
    <div class="oct-lbl">KEYBOARD</div>
    <div style="display:flex;align-items:center;gap:6px;">
     <button class="btn oct-btn" id="octd">–</button>
     <span class="oct-lbl" id="octdisp">3</span>
     <button class="btn oct-btn" id="octu">+</button>
    </div>
    <div class="oct-lbl" style="font-size:7px;">A–J / W–U = PLAY</div>
   </div>
   <div id="keyboard"></div>
  </div>

 </div><!-- end inner -->
</div><!-- end synth -->

<script>
/* =====================================================
   GRANDMOTHER — WEB AUDIO SYNTHESIZER
   ===================================================== */

// ---- STATE ----
const P = {
  v1: { wave:'sawtooth', oct:0, tune:0 },
  v2: { wave:'sawtooth', oct:0, tune:0.02 },
  mix: { v1:0.8, v2:0.6, noise:0 },
  flt: { cut:1400, res:2.5, envAmt:0.4, drive:1 },
  fenv: { a:0.01, d:0.3, s:0.5, r:0.4 },
  aenv: { a:0.01, d:0.2, s:0.7, r:0.3 },
  lfo: { rate:2, amt:0, wave:'sine', dest:'pitch' },
  arp: { rate:8, mode:'up', on:false },
  rev: { mix:0.2 },
  vol: 0.7
};

let AC=null, N={}, curFreq=null, baseOct=3;
let arpInterval=null, arpNotes=[], arpIdx=0;
let heldFreqs=new Map(); // key -> freq
let pressedComputerKeys=new Set();

// ---- AUDIO INIT ----
function initAudio(){
  if(AC) return;
  AC = new (window.AudioContext||window.webkitAudioContext)();

  // Master
  N.master = AC.createGain(); N.master.gain.value = P.vol;
  N.master.connect(AC.destination);

  // Reverb
  N.dry = AC.createGain(); N.dry.gain.value = 1-P.rev.mix;
  N.wet = AC.createGain(); N.wet.gain.value = P.rev.mix;
  N.rev = AC.createConvolver(); N.rev.buffer = makeRevBuf(2.5, 0.6);
  N.dry.connect(N.master);
  N.rev.connect(N.wet); N.wet.connect(N.master);

  // VCA
  N.vca = AC.createGain(); N.vca.gain.value = 0;
  N.vca.connect(N.dry); N.vca.connect(N.rev);

  // Drive (waveshaper)
  N.drive = AC.createWaveShaper(); setDriveCurve();
  N.drive.connect(N.vca);

  // Ladder filter: 4× biquad lowpass in series
  N.flts = [];
  for(let i=0;i<4;i++){
    const f = AC.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=P.flt.cut;
    f.Q.value = [P.flt.res*.6, P.flt.res*.4, .5, .3][i];
    if(i>0) N.flts[i-1].connect(f);
    N.flts.push(f);
  }
  N.flts[3].connect(N.drive);

  // Mixer bus
  N.mixbus = AC.createGain(); N.mixbus.gain.value=1;
  N.mixbus.connect(N.flts[0]);

  // VCO1
  N.o1 = AC.createOscillator(); N.o1.type=P.v1.wave; N.o1.frequency.value=440;
  N.g1 = AC.createGain(); N.g1.gain.value=P.mix.v1;
  N.o1.connect(N.g1); N.g1.connect(N.mixbus); N.o1.start();

  // VCO2
  N.o2 = AC.createOscillator(); N.o2.type=P.v2.wave; N.o2.frequency.value=441;
  N.g2 = AC.createGain(); N.g2.gain.value=P.mix.v2;
  N.o2.connect(N.g2); N.g2.connect(N.mixbus); N.o2.start();

  // Noise
  const nb=AC.sampleRate*2, nbuf=AC.createBuffer(1,nb,AC.sampleRate);
  const nd=nbuf.getChannelData(0); for(let i=0;i<nb;i++) nd[i]=Math.random()*2-1;
  N.noise = AC.createBufferSource(); N.noise.buffer=nbuf; N.noise.loop=true;
  N.gn = AC.createGain(); N.gn.gain.value=P.mix.noise;
  N.noise.connect(N.gn); N.gn.connect(N.mixbus); N.noise.start();

  // LFO
  N.lfo = AC.createOscillator(); N.lfo.type=P.lfo.wave; N.lfo.frequency.value=P.lfo.rate;
  N.lgain = AC.createGain(); N.lgain.gain.value=0;
  N.lfo.connect(N.lgain); N.lfo.start();
  routeLFO();
}

function makeRevBuf(dur, dec){
  const len=Math.round(AC.sampleRate*dur), buf=AC.createBuffer(2,len,AC.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++){
      const e=Math.pow(1-i/len,dec);
      d[i]=(Math.random()*2-1)*e;
      // spring flutter
      if(i>80) d[i]+=d[i-60]*.12*Math.sin(i*.018);
    }
  }
  return buf;
}

function setDriveCurve(){
  if(!N.drive) return;
  const n=512, c=new Float32Array(n), k=(P.flt.drive-1)*4;
  for(let i=0;i<n;i++){
    const x=(i*2)/n-1;
    c[i]=k>0 ? (Math.PI+k)*x/(Math.PI+k*Math.abs(x)) : x;
  }
  N.drive.curve=c;
}

function routeLFO(){
  if(!N.lgain) return;
  try{N.lgain.disconnect();}catch(e){}
  const a=P.lfo.amt;
  if(P.lfo.dest==='pitch'){
    N.lgain.connect(N.o1.frequency); N.lgain.connect(N.o2.frequency);
    N.lgain.gain.setTargetAtTime(a*200, AC.currentTime, .01);
  } else if(P.lfo.dest==='filter'){
    N.flts.forEach(f=>N.lgain.connect(f.frequency));
    N.lgain.gain.setTargetAtTime(a*3000, AC.currentTime, .01);
  } else {
    N.lgain.connect(N.vca.gain);
    N.lgain.gain.setTargetAtTime(a*.4, AC.currentTime, .01);
  }
}

// ---- NOTE ON/OFF ----
function noteOn(freq){
  initAudio();
  if(AC.state==='suspended') AC.resume();
  curFreq=freq;
  const f1=freq*Math.pow(2,P.v1.oct), f2=freq*Math.pow(2,P.v2.oct)*(1+P.v2.tune);
  N.o1.frequency.setTargetAtTime(f1, AC.currentTime, .004);
  N.o2.frequency.setTargetAtTime(f2, AC.currentTime, .004);
  const t=AC.currentTime;
  // Filter env
  const base=P.flt.cut, peak=base*(1+P.flt.envAmt*12), sus=base+(peak-base)*P.fenv.s;
  N.flts.forEach(f=>{
    f.frequency.cancelScheduledValues(t);
    f.frequency.setValueAtTime(base,t);
    f.frequency.linearRampToValueAtTime(peak, t+P.fenv.a);
    f.frequency.setTargetAtTime(sus, t+P.fenv.a, P.fenv.d*.3);
  });
  // Amp env
  N.vca.gain.cancelScheduledValues(t);
  N.vca.gain.setValueAtTime(.001,t);
  N.vca.gain.linearRampToValueAtTime(.75, t+P.aenv.a);
  N.vca.gain.setTargetAtTime(.75*P.aenv.s, t+P.aenv.a, P.aenv.d*.3);
}

function noteOff(){
  if(!AC) return;
  const t=AC.currentTime;
  N.flts.forEach(f=>{
    f.frequency.cancelScheduledValues(t);
    f.frequency.setTargetAtTime(P.flt.cut*.2, t, P.fenv.r*.3);
  });
  N.vca.gain.cancelScheduledValues(t);
  N.vca.gain.setTargetAtTime(.0001, t, P.aenv.r*.3);
}

// ---- KNOB CLASS ----
class Knob {
  constructor(id, opt){
    this.el=document.getElementById(id);
    this.min=opt.min; this.max=opt.max; this.val=opt.val;
    this.fn=opt.fn||function(){};
    this.sz=this.el.width;
    this.drag=false; this.sy=0; this.sv=0;
    this.el.addEventListener('mousedown',e=>{
      this.drag=true; this.sy=e.clientY; this.sv=this.val; e.preventDefault();
      document.body.style.cursor='ns-resize';
    });
    document.addEventListener('mousemove',e=>{
      if(!this.drag) return;
      const d=(this.sy-e.clientY)/160*(this.max-this.min);
      this.set(this.sv+d);
    });
    document.addEventListener('mouseup',()=>{ if(this.drag){this.drag=false; document.body.style.cursor='';} });
    this.el.addEventListener('wheel',e=>{ e.preventDefault(); this.set(this.val+(-e.deltaY/800)*(this.max-this.min)); },{passive:false});
    this.draw();
  }
  set(v){
    this.val=Math.max(this.min,Math.min(this.max,v));
    this.draw(); this.fn(this.val);
  }
  draw(){
    const cv=this.el, c=cv.getContext('2d');
    const s=this.sz, cx=s/2, cy=s/2, r=s/2-4;
    c.clearRect(0,0,s,s);
    // Shadow
    c.beginPath(); c.arc(cx+1,cy+2,r,0,Math.PI*2);
    c.fillStyle='rgba(0,0,0,.45)'; c.fill();
    // Body
    const g=c.createRadialGradient(cx-r*.3,cy-r*.3,r*.1,cx,cy,r);
    g.addColorStop(0,'#D0C0A0'); g.addColorStop(.6,'#A89070'); g.addColorStop(1,'#706050');
    c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2); c.fillStyle=g; c.fill();
    // Ring
    const SA=135*Math.PI/180, SWEEP=270*Math.PI/180;
    const norm=(this.val-this.min)/(this.max-this.min);
    const EA=SA+SWEEP;
    c.beginPath(); c.arc(cx,cy,r+3,SA,EA);
    c.strokeStyle='rgba(0,0,0,.35)'; c.lineWidth=2.5; c.lineCap='round'; c.stroke();
    // Value arc
    if(norm>0){
      c.beginPath(); c.arc(cx,cy,r+3,SA,SA+norm*SWEEP);
      c.strokeStyle='#E87820'; c.lineWidth=2.5; c.lineCap='round'; c.stroke();
    }
    // Indicator
    const ang=SA+norm*SWEEP;
    c.beginPath();
    c.moveTo(cx+(r-7)*Math.cos(ang), cy+(r-7)*Math.sin(ang));
    c.lineTo(cx+(r-1)*Math.cos(ang), cy+(r-1)*Math.sin(ang));
    c.strokeStyle='#1A0E06'; c.lineWidth=2; c.lineCap='round'; c.stroke();
    // Highlight
    const h=c.createRadialGradient(cx-r*.25,cy-r*.25,0,cx,cy,r*.5);
    h.addColorStop(0,'rgba(255,255,255,.18)'); h.addColorStop(1,'rgba(255,255,255,0)');
    c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2); c.fillStyle=h; c.fill();
  }
}

// ---- WAVE SELECTOR ----
const WAVES=[
  {id:'sine',    svg:'<path d="M0,4.5 C2,4.5 2,0 4,0 C6,0 6,9 8,9 C10,9 10,4.5 12,4.5" fill="none" stroke="currentColor" stroke-width="1.3"/>'},
  {id:'triangle',svg:'<polyline points="0,9 3,0 9,9 12,4.5" fill="none" stroke="currentColor" stroke-width="1.3"/>'},
  {id:'sawtooth',svg:'<polyline points="0,9 0,0 8,0 8,9 8,0 12,0" fill="none" stroke="currentColor" stroke-width="1.3"/>'},
  {id:'square',  svg:'<polyline points="0,9 0,1 6,1 6,9 6,1 12,1 12,9" fill="none" stroke="currentColor" stroke-width="1.3"/>'}
];

function makeWaveSel(containerId, current, onChange){
  const el=document.getElementById(containerId);
  WAVES.forEach(w=>{
    const b=document.createElement('div');
    b.className='wbtn'+(w.id===current?' on':'');
    b.innerHTML=`<svg viewBox="0 0 12 9">${w.svg}</svg>`;
    b.title=w.id;
    b.onclick=()=>{ el.querySelectorAll('.wbtn').forEach(x=>x.classList.remove('on')); b.classList.add('on'); onChange(w.id); };
    el.appendChild(b);
  });
}

// ---- KEYBOARD ----
const WN=['C','D','E','F','G','A','B'];
const BK={'C':'C#','D':'D#','F':'F#','G':'G#','A':'A#'};
const BOFF={'C#':18,'D#':46,'F#':101,'G#':129,'A#':157}; // left px within octave (white key width=26)

function midiFreq(note,oct){
  const ns=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  return 440*Math.pow(2,((oct-4)*12+ns.indexOf(note)-9)/12);
}

function buildKbd(){
  const kbd=document.getElementById('keyboard');
  kbd.innerHTML='';
  const W=26, octs=3, total=octs*7*W;
  kbd.style.width=total+'px';
  for(let o=baseOct;o<baseOct+octs;o++){
    const off=(o-baseOct)*7*W;
    WN.forEach((n,i)=>{
      const k=document.createElement('div'); k.className='wkey';
      k.style.left=(off+i*W)+'px';
      const f=midiFreq(n,o); k.dataset.freq=f; k.dataset.id=n+o;
      k.addEventListener('mousedown',e=>{ e.preventDefault(); kDown(k,f); });
      k.addEventListener('mouseup',()=>kUp(k,f));
      k.addEventListener('mouseleave',()=>{ if(heldFreqs.has(k.dataset.id)) kUp(k,f); });
      kbd.appendChild(k);
      if(BK[n]){
        const b=document.createElement('div'); b.className='bkey';
        b.style.left=(off+BOFF[BK[n]])+'px';
        const bf=midiFreq(BK[n],o); b.dataset.freq=bf; b.dataset.id=BK[n]+o;
        b.addEventListener('mousedown',e=>{ e.preventDefault(); kDown(b,bf); });
        b.addEventListener('mouseup',()=>kUp(b,bf));
        b.addEventListener('mouseleave',()=>{ if(heldFreqs.has(b.dataset.id)) kUp(b,bf); });
        kbd.appendChild(b);
      }
    });
  }
}

function kDown(el,freq){
  heldFreqs.set(el.dataset.id,freq); el.classList.add('on');
  if(P.arp.on){ updateArpNotes(); if(!arpInterval) startArp(); }
  else noteOn(freq);
}
function kUp(el,freq){
  heldFreqs.delete(el.dataset.id); el.classList.remove('on');
  if(P.arp.on){ updateArpNotes(); if(heldFreqs.size===0) stopArp(); }
  else if(heldFreqs.size===0) noteOff();
  else { const f=[...heldFreqs.values()].pop(); noteOn(f); }
}

// ---- ARPEGGIATOR ----
function updateArpNotes(){
  arpNotes=[...(heldFreqs.values())].sort((a,b)=>a-b);
  if(P.arp.mode==='down') arpNotes.reverse();
  else if(P.arp.mode==='updown'){
    const dn=[...arpNotes].reverse().slice(1,arpNotes.length-1);
    arpNotes=[...arpNotes,...dn];
  } else if(P.arp.mode==='rnd'){
    for(let i=arpNotes.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arpNotes[i],arpNotes[j]]=[arpNotes[j],arpNotes[i]]; }
  }
}
function startArp(){
  arpIdx=0;
  const ms=60000/(P.arp.rate*12);
  arpInterval=setInterval(()=>{
    if(!arpNotes.length) return;
    const f=arpNotes[arpIdx%arpNotes.length]; arpIdx++;
    noteOff(); setTimeout(()=>noteOn(f),15);
    const led=document.getElementById('arpled');
    led.classList.add('on'); setTimeout(()=>led.classList.remove('on'),80);
  },ms);
}
function stopArp(){ clearInterval(arpInterval); arpInterval=null; noteOff(); }

// ---- COMPUTER KEYBOARD ----
const KMAP={
  'a':{n:'C',o:0},'w':{n:'C#',o:0},'s':{n:'D',o:0},'e':{n:'D#',o:0},
  'd':{n:'E',o:0},'f':{n:'F',o:0},'t':{n:'F#',o:0},'g':{n:'G',o:0},
  'y':{n:'G#',o:0},'h':{n:'A',o:0},'u':{n:'A#',o:0},'j':{n:'B',o:0},
  'k':{n:'C',o:1},'o':{n:'C#',o:1},'l':{n:'D',o:1},'p':{n:'D#',o:1},
  ';':{n:'E',o:1}
};
document.addEventListener('keydown',e=>{
  if(e.repeat||e.target.tagName==='BUTTON') return;
  const m=KMAP[e.key]; if(!m||pressedComputerKeys.has(e.key)) return;
  pressedComputerKeys.add(e.key);
  noteOn(midiFreq(m.n, baseOct+m.o));
});
document.addEventListener('keyup',e=>{
  if(!pressedComputerKeys.has(e.key)) return;
  pressedComputerKeys.delete(e.key);
  if(pressedComputerKeys.size===0) noteOff();
});

// ---- PATCH JACKS (DECORATIVE) ----
function buildJacks(){
  const area=document.getElementById('jacks');
  ['VCO1','VCO2','NOISE','MIX OUT','FILT IN','FILT OUT','ENV F','ENV A','LFO OUT','ARP CLK','CV IN','GATE IN','CV OUT','GATE OUT','AUX IN','AUX OUT'].forEach(j=>{
    const g=document.createElement('div'); g.className='jack-g';
    g.innerHTML=`<div class="jack"></div><div class="jl">${j}</div>`;
    area.appendChild(g);
  });
}

// ---- UI INIT ----
function initUI(){
  // Wave selectors
  makeWaveSel('w1','sawtooth',w=>{ P.v1.wave=w; if(N.o1) N.o1.type=w; });
  makeWaveSel('w2','sawtooth',w=>{ P.v2.wave=w; if(N.o2) N.o2.type=w; });
  makeWaveSel('wl','sine',    w=>{ P.lfo.wave=w; if(N.lfo) N.lfo.type=w; });

  // VCO1
  new Knob('v1oct',{min:-2,max:2,val:0,fn:v=>{ P.v1.oct=Math.round(v); }});
  new Knob('v1tune',{min:-.5,max:.5,val:0,fn:v=>{ P.v1.tune=v; }});
  // VCO2
  new Knob('v2oct',{min:-2,max:2,val:0,fn:v=>{ P.v2.oct=Math.round(v); }});
  new Knob('v2tune',{min:-.5,max:.5,val:.02,fn:v=>{ P.v2.tune=v; }});

  // Mixer
  new Knob('mx1',{min:0,max:1,val:.8,fn:v=>{ P.mix.v1=v; if(N.g1) N.g1.gain.value=v; }});
  new Knob('mx2',{min:0,max:1,val:.6,fn:v=>{ P.mix.v2=v; if(N.g2) N.g2.gain.value=v; }});
  new Knob('mxn',{min:0,max:1,val:0, fn:v=>{ P.mix.noise=v; if(N.gn) N.gn.gain.value=v; }});

  // Filter — cutoff uses log scale internally (0–1 → 40–18000)
  new Knob('fcut',{min:0,max:1,val:.28,fn:v=>{ const f=40*Math.pow(18000/40,v); P.flt.cut=f; if(N.flts){ N.flts.forEach(x=>x.frequency.value=f); } }});
  new Knob('fres',{min:.5,max:18,val:2.5,fn:v=>{ P.flt.res=v; if(N.flts){ N.flts[0].Q.value=v*.6; N.flts[1].Q.value=v*.4; N.flts[2].Q.value=.5; N.flts[3].Q.value=.3; }}});
  new Knob('fenv',{min:0,max:1,val:.4,fn:v=>{ P.flt.envAmt=v; }});
  new Knob('fdrv',{min:1,max:5,val:1,fn:v=>{ P.flt.drive=v; setDriveCurve(); }});

  // Filter env
  new Knob('fea',{min:.001,max:4,val:.01,fn:v=>P.fenv.a=v});
  new Knob('fed',{min:.01,max:4,val:.3,fn:v=>P.fenv.d=v});
  new Knob('fes',{min:0,max:1,val:.5,fn:v=>P.fenv.s=v});
  new Knob('fer',{min:.01,max:6,val:.4,fn:v=>P.fenv.r=v});
  // Amp env
  new Knob('aea',{min:.001,max:4,val:.01,fn:v=>P.aenv.a=v});
  new Knob('aed',{min:.01,max:4,val:.2,fn:v=>P.aenv.d=v});
  new Knob('aes',{min:0,max:1,val:.7,fn:v=>P.aenv.s=v});
  new Knob('aer',{min:.01,max:6,val:.3,fn:v=>P.aenv.r=v});

  // LFO
  new Knob('lrate',{min:.1,max:20,val:2,fn:v=>{ P.lfo.rate=v; if(N.lfo) N.lfo.frequency.value=v; }});
  new Knob('lamt',{min:0,max:1,val:0,fn:v=>{ P.lfo.amt=v; routeLFO(); }});

  // LFO dest
  const ldel=document.getElementById('ldest');
  ['pitch','filter','amp'].forEach(d=>{
    const b=document.createElement('button'); b.className='btn'+(d==='pitch'?' on':'');
    b.textContent=d.toUpperCase().slice(0,3);
    b.onclick=()=>{ ldel.querySelectorAll('.btn').forEach(x=>x.classList.remove('on')); b.classList.add('on'); P.lfo.dest=d; routeLFO(); };
    ldel.appendChild(b);
  });

  // Arp
  new Knob('arprate',{min:1,max:20,val:8,fn:v=>{ P.arp.rate=v; if(arpInterval){stopArp(); if(arpNotes.length) startArp();} }});
  const amdel=document.getElementById('arpmode');
  [{id:'up',lbl:'↑'},{id:'down',lbl:'↓'},{id:'updown',lbl:'↕'},{id:'rnd',lbl:'?'}].forEach(m=>{
    const b=document.createElement('button'); b.className='btn'+(m.id==='up'?' on':'');
    b.textContent=m.lbl;
    b.onclick=()=>{ amdel.querySelectorAll('.btn').forEach(x=>x.classList.remove('on')); b.classList.add('on'); P.arp.mode=m.id; };
    amdel.appendChild(b);
  });
  document.getElementById('arpbtn').onclick=function(){
    P.arp.on=!P.arp.on;
    this.textContent=P.arp.on?'ON':'OFF'; this.classList.toggle('on',P.arp.on);
    if(!P.arp.on) stopArp();
  };

  // Reverb + Master
  new Knob('rvb',{min:0,max:1,val:.2,fn:v=>{ P.rev.mix=v; if(N.dry){N.dry.gain.value=1-v; N.wet.gain.value=v;} }});
  new Knob('mvol',{min:0,max:1,val:.7,fn:v=>{ P.vol=v; if(N.master) N.master.gain.value=v; }});

  // Octave controls
  document.getElementById('octd').onclick=()=>{ baseOct=Math.max(0,baseOct-1); document.getElementById('octdisp').textContent=baseOct; buildKbd(); };
  document.getElementById('octu').onclick=()=>{ baseOct=Math.min(6,baseOct+1); document.getElementById('octdisp').textContent=baseOct; buildKbd(); };

  buildKbd();
  buildJacks();
}

document.addEventListener('DOMContentLoaded', initUI);
</script>
